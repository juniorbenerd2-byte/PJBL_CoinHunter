<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Anti-cache headers to force browsers to load latest layout -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script>
      var layoutSize = { w: 1024, h: 768 };
      var X_POSITION;
      var Y_POSITION;
      var relativeSize;
    </script>
    <script src="scenePlay.js?v=1.2"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        height: 100dvh; /* Dynamic viewport height to prevent browser navigation overlay issues */
        overflow: hidden;
        background: #0d0d13;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      }

      /* Ambient background using game assets */
      #ambient-bg {
        position: fixed;
        inset: 0;
        background: url('Assets/images/BG.png') no-repeat center center;
        background-size: cover;
        transition: filter 0.3s ease, transform 0.3s ease;
        z-index: -1;
      }

      /* Desktop & Landscape background: clear background, adjustments to fit screen */
      @media (orientation: landscape) {
        #ambient-bg {
          filter: brightness(0.45) saturate(1.1);
        }
      }

      /* Portrait background: blurred since we show orientation warning overlay */
      @media (orientation: portrait) {
        #ambient-bg {
          filter: blur(20px) brightness(0.3) saturate(1.1);
          transform: scale(1.1);
        }
      }

      canvas {
        display: block;
      }

      /* Game wrapper & container */
      #game-wrapper {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        max-height: 100dvh;
      }

      #game-container {
        display: block;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
        border-radius: 12px;
        overflow: hidden;
      }

      /* Orientation warning overlay for portrait mode */
      #orientation-warning {
        position: fixed;
        inset: 0;
        background: rgba(10, 10, 15, 0.96);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        z-index: 100000;
        display: none;
        align-items: center;
        justify-content: center;
        color: #fff;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
      }

      /* Show only in portrait mode on mobile/tablet */
      @media (orientation: portrait) and (max-width: 1024px) {
        #orientation-warning {
          display: flex;
        }
      }

      .warning-content {
        max-width: 400px;
        animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .phone-icon-container {
        margin-bottom: 24px;
        color: #ffa726;
      }

      .phone-rotate-svg {
        animation: rotatePhone 2.5s infinite ease-in-out;
      }

      @keyframes rotatePhone {
        0%, 10% {
          transform: rotate(0deg);
        }
        40%, 60% {
          transform: rotate(-90deg);
        }
        90%, 100% {
          transform: rotate(0deg);
        }
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .warning-content h2 {
        font-size: 26px;
        margin: 0 0 12px 0;
        font-weight: 700;
        background: linear-gradient(135deg, #ffffff 40%, #ffa726 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .warning-content p {
        font-size: 15px;
        line-height: 1.6;
        color: #a0a0ba;
        margin: 0;
      }

      /* Mobile controls overlay - Using fixed positioning to bypass view height offsets */
      #mobile-controls {
                --ctl-size: clamp(85px, 18vh, 115px);
        --ctl-gap: clamp(12px, 2.5vh, 20px);
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        margin: 0 auto;
        display: none;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        padding-top: 16px;
        padding-bottom: max(36px, env(safe-area-inset-bottom, 24px));
        padding-left: max(24px, env(safe-area-inset-left, 20px));
        padding-right: max(24px, env(safe-area-inset-right, 20px));
        pointer-events: none;
        z-index: 9999;
        box-sizing: border-box;
        width: 100%;
        max-width: 1024px;
      }

      #mobile-controls.is-visible {
        display: flex;
      }

      #mobile-controls .control-zone {
        pointer-events: auto;
        touch-action: manipulation;
        -webkit-user-select: none;
        user-select: none;
      }

      /* D-pad cluster (left) - Flex layout for flat row */
      #mobile-controls .dpad {
        display: flex;
        gap: var(--ctl-gap);
        align-items: center;
      }

      /* Direction buttons - Brighter white glassmorphism for visibility */
      #mobile-controls .ctl {
        width: var(--ctl-size);
        height: var(--ctl-size);
        min-width: 38px;
        min-height: 38px;
        padding: 0;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.45);
        background: rgba(255, 255, 255, 0.28);
        color: #ffffff;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
        font-size: clamp(16px, 3.5vh, 22px);
        font-weight: 700;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        -webkit-tap-highlight-color: transparent;
        transition:
          transform 100ms ease,
          box-shadow 100ms ease,
          border-color 100ms ease,
          background 100ms ease;
      }

      #mobile-controls .ctl .ctl-icon {
        display: block;
        pointer-events: none;
      }

      #mobile-controls .ctl:active,
      #mobile-controls .ctl.active {
        transform: scale(0.9);
        border-color: rgba(255, 180, 80, 0.85);
        box-shadow:
          0 4px 16px rgba(0, 0, 0, 0.5),
          inset 0 2px 8px rgba(0, 0, 0, 0.3);
        background: rgba(255, 180, 80, 0.5);
      }

      /* Action button (right) */
      #mobile-controls .action-zone {
        display: flex;
        align-items: flex-end;
      }

      #mobile-controls .ctl.action {
                --action-size: clamp(96px, 20vh, 120px);
        width: var(--action-size);
        height: var(--action-size);
        min-width: 58px;
        min-height: 58px;
        border-radius: 50%;
        border: 2px solid rgba(255, 180, 80, 0.55);
        background: linear-gradient(
          135deg,
          rgba(255, 140, 60, 0.9) 0%,
          rgba(232, 74, 32, 0.9) 100%
        );
        box-shadow:
          0 12px 32px rgba(255, 90, 40, 0.35),
          0 4px 12px rgba(0, 0, 0, 0.35),
          inset 0 2px 8px rgba(255, 255, 255, 0.2);
        color: #fff;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
        font-size: clamp(11px, 2.5vh, 14px);
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      #mobile-controls .ctl.action:active,
      #mobile-controls .ctl.action.active {
        transform: scale(0.9);
        box-shadow:
          0 6px 16px rgba(255, 90, 40, 0.25),
          inset 0 4px 12px rgba(0, 0, 0, 0.3);
        background: linear-gradient(
          135deg,
          rgba(255, 140, 60, 0.75) 0%,
          rgba(232, 74, 32, 0.75) 100%
        );
      }

      /* Landscape phone: compact vertical space */
      @media (max-width: 1024px) and (orientation: landscape) {
        #mobile-controls {
                  --ctl-size: clamp(80px, 18vh, 110px);
        --ctl-gap: clamp(12px, 2.5vh, 20px);
        padding-top: 8px;
        padding-bottom: max(48px, env(safe-area-inset-bottom, 36px));
        padding-left: max(30px, env(safe-area-inset-left, 20px));
        padding-right: max(30px, env(safe-area-inset-right, 20px));
        }

        #mobile-controls .action-zone {
          padding-bottom: 0;
        }

        #mobile-controls .ctl.action {
          --action-size: clamp(58px, 14vh, 72px);
        }
      }

      /* Portrait style - backup if not covered by warning */
      @media (max-width: 1024px) and (orientation: portrait) {
        #mobile-controls {
                  --ctl-size: clamp(72px, 14vw, 90px);
        padding-bottom: max(52px, env(safe-area-inset-bottom, 40px));
        }
      }

      /* Very narrow/small height screens */
      @media (max-height: 480px) {
        #mobile-controls {
                  --ctl-size: clamp(60px, 13vh, 78px);
        --ctl-gap: 10px;
        padding-top: 10px;
        padding-bottom: max(36px, env(safe-area-inset-bottom, 26px));
        padding-left: max(20px, env(safe-area-inset-left, 16px));
        padding-right: max(20px, env(safe-area-inset-right, 16px));
        }
        #mobile-controls .ctl.action {
          --action-size: clamp(44px, 11vh, 54px);
        }
      }
    </style>

    <title>Coin Hunter</title>
  </head>
  <body>
    <!-- Ambient blurred background -->
    <div id="ambient-bg"></div>

    <!-- Orientation warning overlay -->
    <div id="orientation-warning">
      <div class="warning-content">
        <div class="phone-icon-container">
          <svg class="phone-rotate-svg" viewBox="0 0 100 100" width="80" height="80">
            <rect class="phone-body" x="35" y="20" width="30" height="60" rx="5" fill="none" stroke="currentColor" stroke-width="4"/>
            <circle class="phone-button" cx="50" cy="73" r="3" fill="currentColor"/>
            <path class="rotate-arrow" d="M 68 35 A 25 25 0 0 1 68 65 L 62 59 M 68 65 L 75 58" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h2>Mode Lanskap Dibutuhkan</h2>
        <p>Silakan putar perangkat Anda ke mode lanskap (landscape) untuk bermain.</p>
      </div>
    </div>

    <div id="game-wrapper">
      <div id="game-container"></div>

      <!-- Mobile controls (touch / pointer) -->
      <div id="mobile-controls" role="group" aria-label="Kontrol game">
        <div class="control-zone dpad" aria-label="Navigasi">
          <button type="button" class="ctl left" data-key="ArrowLeft" aria-label="Kiri">
            <span class="ctl-icon" aria-hidden="true">◀</span>
          </button>
          <button type="button" class="ctl up" data-key="ArrowUp" aria-label="Lompat">
            <span class="ctl-icon" aria-hidden="true">▲</span>
          </button>
          <button type="button" class="ctl right" data-key="ArrowRight" aria-label="Kanan">
            <span class="ctl-icon" aria-hidden="true">▶</span>
          </button>
        </div>
        <div class="control-zone action-zone">
          <button type="button" class="ctl action" data-key=" " aria-label="Lompat">
            <span class="ctl-label">JUMP</span>
          </button>
        </div>
      </div>
    </div>

    <script>
      // Create the Phaser game (do not change game logic)
      const config = {
        type: Phaser.AUTO,
        width: 1024,
        height: 768,
        parent: 'game-container',
        scene: [scenePlay],
        physics: {
          default: "arcade",
          arcade: {
            gravity: { y: 0 },
            debug: false,
          },
        },
        scale: {
          autoCenter: Phaser.Scale.CENTER_BOTH,
        },
      };
      const game = new Phaser.Game(config);

      // Responsive scaling: scale the canvas visually to fit the viewport
      (function makeResponsive() {
        const baseW = layoutSize.w || 1024;
        const baseH = layoutSize.h || 768;

        function applyScale() {
          const canvas = document.querySelector('#game-container canvas');
          if (!canvas) return;
          const scale = Math.min(window.innerWidth / baseW, window.innerHeight / baseH);
          // Center container and set transform-origin to top left to keep layout predictable
          canvas.style.transformOrigin = 'top left';
          canvas.style.transform = `scale(${scale})`;
          // Set container size so that layout stays centered
          const container = document.getElementById('game-container');
          container.style.width = baseW * scale + 'px';
          container.style.height = baseH * scale + 'px';
        }

        // Try applying scale on animation frames until canvas exists
        const maxRetries = 60;
        let tries = 0;
        const tid = setInterval(() => {
          applyScale();
          tries++;
          if (document.querySelector('#game-container canvas') || tries > maxRetries) {
            clearInterval(tid);
          }
        }, 100);

        window.addEventListener('resize', applyScale);
        window.addEventListener('orientationchange', applyScale);
      })();

      // Mobile control buttons: emit keyboard events so existing input handlers work
      (function bindMobileControls() {
        const controls = document.getElementById('mobile-controls');
        if (!controls) return;

        const MOBILE_MAX = 1024;
        const activeButtons = new Map();

        function sendKey(key, type) {
          let keyCode = 0;
          let code = '';
          if (key === 'ArrowLeft') { keyCode = 37; code = 'ArrowLeft'; }
          else if (key === 'ArrowRight') { keyCode = 39; code = 'ArrowRight'; }
          else if (key === 'ArrowUp') { keyCode = 38; code = 'ArrowUp'; }
          else if (key === ' ') { keyCode = 32; code = 'Space'; }

          const eventInit = {
            key: key,
            keyCode: keyCode,
            which: keyCode,
            code: code,
            bubbles: true,
            cancelable: true
          };

          const ev = new KeyboardEvent(type, eventInit);
          
          // Override read-only properties for Phaser / browser compatibility
          Object.defineProperty(ev, 'keyCode', { value: keyCode, enumerable: true });
          Object.defineProperty(ev, 'which', { value: keyCode, enumerable: true });
          Object.defineProperty(ev, 'code', { value: code, enumerable: true });

          window.dispatchEvent(ev);
        }

        function isMobileViewport() {
          const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
          return isTouch || window.innerWidth <= MOBILE_MAX;
        }

        function updateVisibility() {
          controls.classList.toggle('is-visible', isMobileViewport());
        }

        function pressButton(btn) {
          const key = btn.getAttribute('data-key');
          if (!key || activeButtons.has(btn)) return;
          sendKey(key, 'keydown');
          btn.classList.add('active');
          activeButtons.set(btn, key);
        }

        function releaseButton(btn) {
          const key = activeButtons.get(btn);
          if (!key) return;
          sendKey(key, 'keyup');
          btn.classList.remove('active');
          activeButtons.delete(btn);
        }

        function releaseAll() {
          activeButtons.forEach((key, btn) => {
            sendKey(key, 'keyup');
            btn.classList.remove('active');
          });
          activeButtons.clear();
        }

        controls.addEventListener('pointerdown', (e) => {
          const btn = e.target.closest('button[data-key]');
          if (!btn) return;
          e.preventDefault();
          if (btn.setPointerCapture && e.pointerId != null) {
            try {
              btn.setPointerCapture(e.pointerId);
            } catch (_) {}
          }
          pressButton(btn);
        });

        controls.addEventListener('pointerup', (e) => {
          const btn = e.target.closest('button[data-key]');
          if (btn) releaseButton(btn);
        });

        controls.addEventListener('pointercancel', (e) => {
          const btn = e.target.closest('button[data-key]');
          if (btn) releaseButton(btn);
        });

        controls.addEventListener('pointerleave', (e) => {
          if (e.buttons !== 0) return;
          const btn = e.target.closest('button[data-key]');
          if (btn) releaseButton(btn);
        });

        window.addEventListener('blur', releaseAll);
        window.addEventListener('resize', updateVisibility);
        window.addEventListener('orientationchange', updateVisibility);
        updateVisibility();

        controls.addEventListener(
          'touchstart',
          (e) => {
            if (e.target.closest('button[data-key]')) e.preventDefault();
          },
          { passive: false }
        );
      })();
    </script>
  </body>
</html>
